<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <link rel="stylesheet" href="../css/tyle3.css">
</head>
<body>
    <div class="signup-container">
        <form id="signup-form" class="signup-form">
            <h2>Thông Tin Đăng Ký</h2>
            <p>Vui lòng điền thông tin để đăng ký</p>
            <hr>

            <div class="input-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập..." required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" name="phone" placeholder="090x xxx xxx" pattern="[0-9]{10}" required>
            </div>

            <div class="input-group">
                <label>Giới tính</label>
                <div class="gender-options">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male" required> <span>Nam</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="female"> <span>Nữ</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="other"> <span>Khác</span>
                    </label>
                </div>
            </div> <div class="input-group">
                <label>Điểm mạnh của bạn</label>
                <div class="skills-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="web"> <span>Lập trình Web</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="design"> <span>Thiết kế Đồ họa</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="communication"> <span>Giao tiếp</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required>
            </div>

            <button type="submit" class="btn-signup">Đăng Ký</button>
            <button type="reset" class="btn-signup">Hủy Đăng Ký</button>
            <p class="signin-link">Đã có tài khoản? <a href="#">Đăng nhập ngay</a></p>
        </form>
    </div>
</body>
</html>
